<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BO growclub - Portal B2B de Compras Consolidadas</title>
  <meta name="description" content="Portal interno de compras consolidadas para vendedores de BO growclub. Centralización de proveedores, stock y precios inteligentes.">
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
  
  <!-- Base Stylesheet (Retail) -->
  <link rel="stylesheet" href="index.css?v=1.5">
  
  <!-- Supabase JS Client -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- B2B Portal Custom Styles -->
  <style>
    :root {
      --color-b2b-bg: #f8f6f0;
      --color-b2b-card: #ffffff;
      --color-b2b-border: #e6e3d8;
      --color-badge-cheapest: #e2f0d9;
      --color-badge-cheapest-text: #385723;
    }

    body {
      background-color: var(--color-b2b-bg);
    }

    .b2b-header {
      background: rgba(21, 45, 36, 0.95);
      backdrop-filter: blur(10px);
      color: #fff;
      padding: 15px 0;
      position: sticky;
      top: 0;
      z-index: 1000;
      border-bottom: 2px solid var(--color-accent-gold);
    }

    .b2b-header-container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
    }

    .b2b-logo-area {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .b2b-logo-img {
      width: 45px;
      height: 45px;
      border-radius: var(--border-radius-sm);
      border: 1px solid var(--color-accent-gold);
      object-fit: cover;
    }

    .b2b-logo-text h1 {
      color: #fff;
      font-size: 1.4rem;
      margin: 0;
      font-family: var(--font-sans);
      font-weight: 700;
      letter-spacing: 1px;
    }

    .b2b-logo-text p {
      color: var(--color-accent-gold);
      font-size: 0.75rem;
      margin: 0;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .b2b-search-wrapper {
      flex-grow: 1;
      max-width: 600px;
      position: relative;
    }

    .b2b-search-input {
      width: 100%;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: #fff;
      padding: 10px 15px 10px 40px;
      border-radius: var(--border-radius-sm);
      outline: none;
      transition: var(--transition-fast);
    }

    .b2b-search-input:focus {
      background: rgba(255, 255, 255, 0.15);
      border-color: var(--color-accent-gold);
    }

    .b2b-search-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(255, 255, 255, 0.5);
    }

    .b2b-cart-trigger {
      background: var(--color-accent-gold);
      color: #152d24;
      border: none;
      padding: 10px 18px;
      font-weight: 600;
      border-radius: var(--border-radius-sm);
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      transition: var(--transition-smooth);
    }

    .b2b-cart-trigger:hover {
      background: var(--color-accent-gold-dark);
      transform: translateY(-2px);
    }

    .b2b-main-layout {
      max-width: 1400px;
      margin: 30px auto;
      padding: 0 20px;
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 30px;
    }

    .b2b-sidebar-card {
      background: var(--color-b2b-card);
      border: 1px solid var(--color-b2b-border);
      border-radius: var(--border-radius-md);
      padding: 20px;
      position: sticky;
      top: 100px;
      height: fit-content;
      box-shadow: var(--shadow-sm);
    }

    .b2b-sidebar-title {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--color-primary);
      margin-bottom: 15px;
      border-bottom: 2px solid var(--color-neutral-stone);
      padding-bottom: 8px;
      font-family: var(--font-sans);
    }

    .b2b-category-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .b2b-category-btn {
      width: 100%;
      text-align: left;
      background: none;
      border: none;
      padding: 8px 12px;
      border-radius: var(--border-radius-sm);
      cursor: pointer;
      font-size: 0.9rem;
      transition: var(--transition-fast);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .b2b-category-btn:hover {
      background: var(--color-neutral-light);
      color: var(--color-primary);
    }

    .b2b-category-btn.active {
      background: var(--color-primary);
      color: #fff;
      font-weight: 500;
    }

    .b2b-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 24px;
    }

    .b2b-card {
      background: var(--color-b2b-card);
      border: 1px solid var(--color-b2b-border);
      border-radius: var(--border-radius-md);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: var(--shadow-sm);
      transition: var(--transition-smooth);
    }

    .b2b-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-md);
    }

    .b2b-card-img-wrapper {
      width: 100%;
      aspect-ratio: 1 / 1;
      background: #fbfbfa;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      border-bottom: 1px solid var(--color-b2b-border);
      padding: 15px;
    }

    .b2b-card-img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      mix-blend-mode: multiply;
    }

    .b2b-card-content {
      padding: 20px;
      display: flex;
      flex-direction: column;
      flex-grow: 1;
    }

    .b2b-card-category {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--color-accent-gold-dark);
      font-weight: 600;
      margin-bottom: 6px;
    }

    .b2b-card-title {
      font-size: 1rem;
      font-weight: 600;
      color: var(--color-neutral-dark);
      margin-bottom: 15px;
      line-height: 1.4;
      height: 2.8em;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      font-family: var(--font-sans);
    }

    /* Suppliers List inside Card */
    .b2b-supplier-list {
      margin-top: auto;
      border: 1px solid var(--color-b2b-border);
      border-radius: var(--border-radius-sm);
      overflow: hidden;
      margin-bottom: 15px;
    }

    .b2b-supplier-row {
      display: grid;
      grid-template-columns: 20px 1fr auto auto;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border-bottom: 1px solid var(--color-b2b-border);
      cursor: pointer;
      font-size: 0.85rem;
      transition: var(--transition-fast);
      position: relative;
    }

    .b2b-supplier-row:last-child {
      border-bottom: none;
    }

    .b2b-supplier-row:hover {
      background: var(--color-neutral-light);
    }

    .b2b-supplier-row.selected {
      background: rgba(195, 155, 75, 0.08);
      font-weight: 600;
    }

    .b2b-supplier-row.selected::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 3px;
      background: var(--color-accent-gold);
    }

    .b2b-supplier-radio {
      accent-color: var(--color-accent-gold);
    }

    .b2b-supplier-name {
      color: var(--color-neutral-dark);
    }

    .b2b-supplier-stock {
      color: #666;
      font-size: 0.75rem;
    }

    .b2b-supplier-stock.out-of-stock {
      color: #d9534f;
      font-weight: 600;
    }

    .b2b-supplier-price {
      color: var(--color-primary);
      font-weight: 600;
    }

    .b2b-best-price-badge {
      background: var(--color-badge-cheapest);
      color: var(--color-badge-cheapest-text);
      font-size: 0.65rem;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-left: 5px;
      display: inline-block;
    }

    .b2b-card-footer {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .b2b-qty-selector {
      display: flex;
      border: 1px solid var(--color-b2b-border);
      border-radius: var(--border-radius-sm);
      overflow: hidden;
      height: 40px;
    }

    .b2b-qty-btn {
      width: 32px;
      background: var(--color-neutral-light);
      border: none;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 600;
      transition: var(--transition-fast);
    }

    .b2b-qty-btn:hover {
      background: var(--color-neutral-stone);
    }

    .b2b-qty-value {
      width: 40px;
      border: none;
      text-align: center;
      font-weight: 600;
      outline: none;
      font-size: 0.9rem;
    }

    .b2b-add-btn {
      flex-grow: 1;
      height: 40px;
      background: var(--color-primary);
      color: #fff;
      border: none;
      border-radius: var(--border-radius-sm);
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition-smooth);
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
    }

    .b2b-add-btn:hover {
      background: var(--color-primary-light);
    }

    .b2b-add-btn:disabled {
      background: var(--color-b2b-border);
      color: #999;
      cursor: not-allowed;
    }

    /* Cart Sidebar / Drawer Styling */
    .b2b-cart-drawer {
      position: fixed;
      right: -420px;
      top: 0;
      bottom: 0;
      width: 420px;
      background: #fff;
      z-index: 1050;
      box-shadow: -8px 0 32px rgba(21, 45, 36, 0.15);
      display: flex;
      flex-direction: column;
      transition: right 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
    }

    .b2b-cart-drawer.open {
      right: 0;
    }

    .b2b-cart-overlay {
      position: fixed;
      inset: 0;
      background: rgba(21, 45, 36, 0.4);
      z-index: 1040;
      display: none;
      backdrop-filter: blur(4px);
    }

    .b2b-cart-overlay.open {
      display: block;
    }

    .b2b-cart-header {
      background: var(--color-primary);
      color: #fff;
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .b2b-cart-header h2 {
      color: #fff;
      margin: 0;
      font-size: 1.25rem;
      font-family: var(--font-sans);
    }

    .b2b-cart-close {
      background: none;
      border: none;
      color: #fff;
      font-size: 1.5rem;
      cursor: pointer;
      line-height: 1;
    }

    .b2b-cart-body {
      flex-grow: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* Cart Grouping by Supplier */
    .b2b-cart-supplier-group {
      border: 1px solid var(--color-b2b-border);
      border-radius: var(--border-radius-md);
      overflow: hidden;
      background: var(--color-neutral-light);
    }

    .b2b-cart-supplier-header {
      background: var(--color-neutral-stone);
      padding: 10px 15px;
      font-weight: 600;
      font-size: 0.9rem;
      color: var(--color-primary);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .b2b-cart-supplier-total {
      font-weight: 700;
    }

    .b2b-cart-item {
      display: grid;
      grid-template-columns: 50px 1fr auto;
      gap: 12px;
      padding: 12px 15px;
      background: #fff;
      border-bottom: 1px solid var(--color-b2b-border);
      align-items: center;
    }

    .b2b-cart-item:last-child {
      border-bottom: none;
    }

    .b2b-cart-item-img {
      width: 50px;
      height: 50px;
      object-fit: contain;
      background: #fafaf9;
      border: 1px solid var(--color-b2b-border);
      border-radius: 4px;
    }

    .b2b-cart-item-info h4 {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--color-neutral-dark);
      margin: 0 0 4px 0;
      font-family: var(--font-sans);
    }

    .b2b-cart-item-info p {
      font-size: 0.75rem;
      color: #666;
      margin: 0;
    }

    /* Supplier override in cart */
    .b2b-cart-item-supplier-select {
      background: var(--color-neutral-light);
      border: 1px solid var(--color-b2b-border);
      font-size: 0.75rem;
      padding: 2px 6px;
      border-radius: 4px;
      margin-top: 4px;
      outline: none;
      max-width: 100%;
    }

    .b2b-cart-item-actions {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 8px;
    }

    .b2b-cart-item-price {
      font-weight: 600;
      font-size: 0.9rem;
      color: var(--color-primary);
    }

    .b2b-cart-item-remove {
      background: none;
      border: none;
      color: #d9534f;
      font-size: 0.75rem;
      cursor: pointer;
      padding: 0;
      font-weight: 500;
    }

    .b2b-cart-item-remove:hover {
      text-decoration: underline;
    }

    .b2b-cart-footer {
      border-top: 1px solid var(--color-b2b-border);
      padding: 20px;
      background: var(--color-neutral-light);
    }

    .b2b-cart-total-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      font-size: 1.15rem;
    }

    .b2b-cart-total-label {
      font-weight: 600;
      color: var(--color-neutral-dark);
    }

    .b2b-cart-total-value {
      font-weight: 700;
      color: var(--color-primary);
      font-size: 1.3rem;
    }

    /* Seller Form */
    .b2b-form-group {
      margin-bottom: 15px;
    }

    .b2b-form-label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #666;
      margin-bottom: 6px;
    }

    .b2b-form-input {
      width: 100%;
      border: 1px solid var(--color-b2b-border);
      border-radius: var(--border-radius-sm);
      padding: 8px 12px;
      font-size: 0.9rem;
      outline: none;
      transition: var(--transition-fast);
    }

    .b2b-form-input:focus {
      border-color: var(--color-accent-gold);
    }

    .b2b-checkout-btn {
      width: 100%;
      background: var(--color-accent-gold);
      color: #152d24;
      border: none;
      padding: 12px;
      font-weight: 700;
      border-radius: var(--border-radius-sm);
      font-size: 1rem;
      cursor: pointer;
      transition: var(--transition-smooth);
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
    }

    .b2b-checkout-btn:hover {
      background: var(--color-accent-gold-dark);
    }

    /* Notification Toast */
    .b2b-toast {
      position: fixed;
      bottom: 20px;
      left: 20px;
      background: var(--color-primary);
      color: #fff;
      padding: 12px 20px;
      border-radius: var(--border-radius-sm);
      box-shadow: var(--shadow-md);
      z-index: 2000;
      display: flex;
      align-items: center;
      gap: 10px;
      transform: translateY(100px);
      opacity: 0;
      transition: transform 0.3s ease, opacity 0.3s ease;
    }

    .b2b-toast.show {
      transform: translateY(0);
      opacity: 1;
    }

    .b2b-toast-success {
      border-left: 4px solid var(--color-accent-gold);
    }

    /* Empty Cart State */
    .b2b-empty-cart {
      text-align: center;
      padding: 40px 20px;
      color: #888;
    }

    .b2b-empty-cart svg {
      width: 48px;
      height: 48px;
      margin-bottom: 15px;
      opacity: 0.5;
    }

    /* Load more loader */
    .b2b-loader {
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 40px auto;
      gap: 10px;
    }

    .b2b-spinner {
      width: 30px;
      height: 30px;
      border: 3px solid var(--color-b2b-border);
      border-top-color: var(--color-accent-gold);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Responsive */
    @media (max-width: 992px) {
      .b2b-main-layout {
        grid-template-columns: 1fr;
      }
      .b2b-sidebar-card {
        position: static;
        margin-bottom: 20px;
      }
      .b2b-header-container {
        flex-direction: column;
        align-items: stretch;
      }
    }
  </style>
</head>
<body>

  <!-- Background Zen Decoration -->
  <div class="zen-bg-glow"></div>

  <!-- Header Navigation -->
  <header class="b2b-header">
    <div class="b2b-header-container">
      <div class="b2b-logo-area">
        <img src="assets/logo.jpg" alt="BO growclub Logo" class="b2b-logo-img">
        <div class="b2b-logo-text">
          <h1>BO growclub</h1>
          <p>Portal de Compras B2B</p>
        </div>
      </div>

      <!-- Search Bar -->
      <div class="b2b-search-wrapper">
        <svg class="icon b2b-search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:18px; height:18px;">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <input type="text" id="b2b-search-input" class="b2b-search-input" placeholder="Buscar productos en catálogos consolidados..." aria-label="Buscar productos">
      </div>

      <!-- Cart Button -->
      <button class="b2b-cart-trigger" id="b2b-cart-trigger-btn">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:20px; height:20px;">
          <circle cx="9" cy="21" r="1"></circle>
          <circle cx="20" cy="21" r="1"></circle>
          <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
        </svg>
        <span>Pedido (<span id="b2b-cart-count">0</span>)</span>
      </button>
    </div>
  </header>

  <!-- Main Layout -->
  <div class="b2b-main-layout">
    
    <!-- Sidebar Categories -->
    <aside class="b2b-sidebar-card">
      <h2 class="b2b-sidebar-title">Categorías B2B</h2>
      <ul class="b2b-category-list" id="b2b-category-list">
        <li><button class="b2b-category-btn active" data-category="all">Todos los Productos <span class="category-count" id="count-all"></span></button></li>
        <li><button class="b2b-category-btn" data-category="Semillas">🌱 Semillas <span class="category-count" id="count-Semillas"></span></button></li>
        <li><button class="b2b-category-btn" data-category="Sustratos">🌿 Sustratos <span class="category-count" id="count-Sustratos"></span></button></li>
        <li><button class="b2b-category-btn" data-category="Fertilizantes">🧪 Fertilizantes <span class="category-count" id="count-Fertilizantes"></span></button></li>
        <li><button class="b2b-category-btn" data-category="Indoor">🏠 Indoor & Luz <span class="category-count" id="count-Indoor"></span></button></li>
        <li><button class="b2b-category-btn" data-category="Vaporizadores">💨 Vaporizadores <span class="category-count" id="count-Vaporizadores"></span></button></li>
        <li><button class="b2b-category-btn" data-category="Macetas">🪴 Macetas <span class="category-count" id="count-Macetas"></span></button></li>
        <li><button class="b2b-category-btn" data-category="Medición y Riego">📐 Medición y Riego <span class="category-count" id="count-Medicion"></span></button></li>
        <li><button class="b2b-category-btn" data-category="Parafernalia">🍁 Parafernalia <span class="category-count" id="count-Parafernalia"></span></button></li>
        <li><button class="b2b-category-btn" data-category="Otros">✨ Otros <span class="category-count" id="count-Otros"></span></button></li>
      </ul>
    </aside>

    <!-- Products Content Area -->
    <main>
      <div id="b2b-product-grid" class="b2b-grid">
        <!-- Products will be dynamically populated here -->
      </div>
      
      <!-- Loader Spinner -->
      <div id="b2b-loader" class="b2b-loader" style="display: none;">
        <div class="b2b-spinner"></div>
        <span>Cargando productos de Supabase...</span>
      </div>

      <!-- Load More Button -->
      <div id="b2b-load-more-container" style="text-align: center; margin: 30px 0; display: none;">
        <button id="b2b-load-more-btn" class="btn btn-secondary" style="padding: 12px 35px; border-radius: var(--border-radius-sm); font-weight: 600;">Cargar más productos</button>
      </div>

      <!-- No Results -->
      <div id="b2b-no-results" style="display: none; text-align: center; padding: 40px; color: #666;">
        <p>No se encontraron productos que coincidan con la búsqueda.</p>
      </div>
    </main>

  </div>

  <!-- Cart Overlay & Drawer -->
  <div class="b2b-cart-overlay" id="b2b-cart-overlay"></div>
  <div class="b2b-cart-drawer" id="b2b-cart-drawer">
    <div class="b2b-cart-header">
      <h2>Pedido Consolidado</h2>
      <button class="b2b-cart-close" id="b2b-cart-close-btn">&times;</button>
    </div>
    
    <div class="b2b-cart-body" id="b2b-cart-body">
      <!-- Grouped cart items will be rendered here -->
    </div>

    <div class="b2b-cart-footer">
      <div class="b2b-cart-total-row">
        <span class="b2b-cart-total-label">Total Estimado B2B:</span>
        <span class="b2b-cart-total-value" id="b2b-cart-total">$0</span>
      </div>

      <!-- Checkout Form -->
      <form id="b2b-checkout-form" onsubmit="event.preventDefault();">
        <div class="b2b-form-group">
          <label for="b2b-vendedor-name" class="b2b-form-label">Nombre del Vendedor *</label>
          <input type="text" id="b2b-vendedor-name" class="b2b-form-input" placeholder="Tu nombre" required>
        </div>
        <div class="b2b-form-group">
          <label for="b2b-order-notes" class="b2b-form-label">Notas Adicionales</label>
          <textarea id="b2b-order-notes" class="b2b-form-input" style="height: 60px; resize: none;" placeholder="Ej. Envío urgente, cambios de última hora..."></textarea>
        </div>
        <button type="submit" class="b2b-checkout-btn" id="b2b-send-order-btn">
          <svg viewBox="0 0 24 24" fill="currentColor" style="width: 20px; height: 20px;">
            <path d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.587-5.946C.003 5.385 5.39.002 12.007 0c3.201.001 6.212 1.244 8.477 3.513 2.266 2.268 3.507 5.28 3.505 8.484-.004 6.618-5.39 11.999-12.007 12.001-2.005-.002-3.97-.502-5.73-1.45L0 24zm6.59-4.846c1.6.95 3.188 1.449 4.825 1.451 5.436-.002 9.858-4.427 9.86-9.868.002-2.635-1.02-5.11-2.88-6.973-1.859-1.863-4.336-2.888-6.974-2.89-5.441 0-9.863 4.423-9.865 9.864-.001 1.704.453 3.37 1.314 4.821L1.895 21.05l4.752-1.896zm12.333-5.32c-.328-.164-1.942-.958-2.242-1.069-.301-.11-.52-.164-.738.164-.219.328-.848 1.069-1.039 1.288-.19.22-.382.246-.71.082-.328-.164-1.386-.51-2.64-1.627-.975-.87-1.633-1.946-1.824-2.274-.19-.328-.02-.505.143-.668.147-.146.328-.382.493-.574.164-.192.219-.328.328-.547.11-.219.055-.41-.027-.574-.082-.164-.738-1.777-1.011-2.434-.266-.64-.539-.553-.738-.563-.19-.01-.41-.011-.629-.011-.219 0-.574.082-.875.41-.301.328-1.148 1.121-1.148 2.733 0 1.612 1.175 3.17 1.339 3.389.164.22 2.313 3.532 5.6 4.95 1.387.6 2.054.74 2.808.648.775-.095 2.242-.917 2.553-1.807.31-.89.31-1.656.219-1.807-.092-.165-.32-.256-.649-.42z"/>
          </svg>
          Enviar Pedido al Encargado
        </button>
      </form>
    </div>
  </div>

  <!-- Toast Notification -->
  <div class="b2b-toast b2b-toast-success" id="b2b-toast">
    <span id="b2b-toast-message">Producto agregado al pedido</span>
  </div>

  <script src="vendedor.js?v=1.0"></script>
</body>
</html>
